<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #090A0F; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; }
        input, button { padding: 10px; border-radius: 10px; border: none; margin: 5px; }
        button { background: #3a7bd5; color: white; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .grade { color: #00ffcc; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="glass header">
            <h2>Bilim IQ</h2>
            <a href="/logout" style="color: #ff4d4d; text-decoration: none;">Шығу</a>
        </div>
        <div class="glass">
            <h3>Тапсырма жіберу</h3>
            <form action="/upload_task" method="POST">
                <input type="text" name="title" placeholder="Тақырып" required style="width: 30%;">
                <input type="url" name="url" placeholder="Сілтеме" required style="width: 45%;">
                <button type="submit">Жіберу</button>
            </form>
        </div>
        <div class="glass">
            <h3>Нәтижелерім</h3>
            <table>
                <tr><th>Тақырып</th><th>Файл</th><th>Баға</th></tr>
                {% for task in tasks %}
                <tr>
                    <td>{{ task.title }}</td>
                    <td><a href="{{ task.file_url }}" target="_blank" style="color: #00d2ff;">Ашу</a></td>
                    <td class="grade">{{ task.grade if task.grade else '...' }}</td>
                </tr>
                {% endfor %}
            </table>
        </div>
    </div>
</body>
</html>
