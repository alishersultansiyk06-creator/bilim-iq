<!DOCTYPE html>
<html>
<head>
    <title>Студент кабинеті</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial; margin: 20px; background-color: #f0f0f0; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); max-width: 800px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .section { margin-top: 20px; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        input, button { padding: 8px; margin: 5px 0; border-radius: 4px; border: 1px solid #ccc; }
        button { background-color: #4CAF50; color: white; cursor: pointer; border: none; }
        .logout-btn { color: red; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Bilim IQ</h2>
            <div>
                <span><b>{{ session.username }}</b></span> | <a href="/logout" class="logout-btn">Шығу</a>
            </div>
        </div>

        <div class="section">
            <h3>Тапсырма жүктеу</h3>
            <form action="/upload_task" method="POST">
                <input type="text" name="title" placeholder="Тақырып (мысалы: Лаб 1)" required style="width: 30%;">
                <input type="url" name="url" placeholder="Файлға сілтеме (Drive/URL)" required style="width: 50%;">
                <button type="submit">Жіберу</button>
            </form>
        </div>

        <div class="section">
            <h3>Менің нәтижелерім</h3>
            <table>
                <tr><th>Тапсырма</th><th>Сілтеме</th><th>Баға</th></tr>
                {% for task in tasks %}
                <tr>
                    <td>{{ task.title }}</td>
                    <td><a href="{{ task.file_url }}" target="_blank">Ашу</a></td>
                    <td><b>{{ task.grade if task.grade else 'Тексерілуде...' }}</b></td>
                </tr>
                {% endfor %}
            </table>
        </div>
    </div>
</body>
</html>
