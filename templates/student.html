<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Студент панелі</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; }
        .header { background: #302b63; color: white; padding: 15px; text-align: center; }
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; }
        button { background: #28a745; color: white; border: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    </style>
</head>
<body>
    <div class="header">
        <h3>Сәлем, {{ session.username }}!</h3>
        <a href="/logout" style="color: white;">Шығу</a>
    </div>
    <div class="container">
        <div class="card">
            <h4>Тапсырма жіберу</h4>
            <form action="/upload" method="POST">
                <input type="text" name="title" placeholder="Тапсырма аты (мысалы, Lab 1)" required>
                <input type="url" name="file_url" placeholder="Файл сілтемесі (Google Drive/Firebase)" required>
                <button type="submit">Жіберу</button>
            </form>
        </div>

        <div class="card">
            <h4>Менің бағаларым</h4>
            <table>
                <tr><th>Тапсырма</th><th>Күйі</th><th>Баға</th></tr>
                {% for task in tasks %}
                <tr>
                    <td>{{ task.title }}</td>
                    <td>{{ task.status }}</td>
                    <td>{{ task.grade or '---' }}</td>
                </tr>
                {% endfor %}
            </table>
        </div>
    </div>
</body>
</html>
