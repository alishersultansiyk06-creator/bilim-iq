<!DOCTYPE html>
<html>
<head><title>Студент</title></head>
<body style="font-family: Arial; margin: 40px;">
    <h2>Bilim IQ - Студент: {{ session.username }}</h2>
    <a href="/logout">Шығу</a>
    <hr>
    <h3>Тапсырма жіберу</h3>
    <form action="/upload_task" method="POST">
        <input type="text" name="title" placeholder="Тақырып" required>
        <input type="url" name="url" placeholder="Файлға сілтеме" required>
        <button type="submit">Жіберу</button>
    </form>
    <hr>
    <h3>Нәтижелерім</h3>
    <table border="1" cellpadding="10">
        <tr><th>Тапсырма</th><th>Сілтеме</th><th>Баға</th></tr>
        {% for task in tasks %}
        <tr>
            <td>{{ task.title }}</td>
            <td><a href="{{ task.file_url }}" target="_blank">Көру</a></td>
            <td>{{ task.grade if task.grade else 'Тексерілуде...' }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
