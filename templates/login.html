<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilim IQ - Кіру</title>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0f0c29;
            background: linear-gradient(to right, #24243e, #302b63, #0f0c29);
            color: white;
            display: flex; align-items: center; justify-content: center;
            height: 100vh;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 20px;
            width: 90%; max-width: 350px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            text-align: center;
        }
        input {
            width: 100%; padding: 12px; margin: 10px 0;
            border-radius: 10px; border: none; outline: none;
            box-sizing: border-box;
        }
        button {
            width: 100%; padding: 12px;
            background: #6e8efb; border: none;
            border-radius: 10px; color: white; font-weight: bold;
            cursor: pointer; margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Bilim IQ</h2>
        <form method="POST">
            <input type="text" name="user" placeholder="Логин" required>
            <input type="password" name="pass" placeholder="Құпия сөз" required>
            <button type="submit">Кіру</button>
        </form>
    </div>
</body>
</html>
