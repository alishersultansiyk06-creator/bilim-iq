<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <title>BILIM.IQ | Кіру</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; }
        .login-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); padding: 40px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); width: 350px; color: white; text-align: center; }
        input { background: rgba(255,255,255,0.1) !important; border: none !important; color: white !important; margin-bottom: 15px; }
        .btn-primary { background: #5d5fef; border: none; width: 100%; padding: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>BILIM.IQ</h2>
        <p class="text-muted">Жүйеге кіру</p>
        <form method="POST">
            <input type="text" name="user" class="form-control" placeholder="Логин" required>
            <input type="password" name="pass" class="form-control" placeholder="Құпия сөз" required>
            <button type="submit" class="btn btn-primary">КІРУ</button>
        </form>
    </div>
</body>
</html>
