<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilim IQ - Кіру</title>
    <style>
        body {
            margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle at bottom, #1B2735 0%, #090A0F 100%);
            font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px; padding: 40px;
            width: 90%; max-width: 350px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        input {
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 12px;
            border: none; background: rgba(255, 255, 255, 0.1); color: white; outline: none;
            box-sizing: border-box;
        }
        button {
            width: 100%; padding: 12px; border-radius: 12px; border: none;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            color: white; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(0,210,255,0.5); }
    </style>
</head>
<body>
    <div class="glass-card">
        <h1>Bilim IQ</h1>
        <form method="POST">
            <input type="text" name="user" placeholder="Логин" required>
            <input type="password" name="pass" placeholder="Құпия сөз" required>
            <button type="submit">Кіру</button>
        </form>
    </div>
</body>
</html>
