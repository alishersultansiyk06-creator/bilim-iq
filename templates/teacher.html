<!DOCTYPE html>
<html>
<head><title>Мұғалім</title></head>
<body style="font-family: Arial; margin: 40px;">
    <h2>Bilim IQ - Мұғалім панелі</h2>
    <a href="/logout">Шығу</a>
    <hr>
    <h3>Студенттердің жұмыстары</h3>
    <table border="1" cellpadding="10">
        <tr><th>Студент</th><th>Тақырып</th><th>Файл</th><th>Баға қою</th></tr>
        {% for task, user in tasks %}
        <tr>
            <td>{{ user.username }}</td>
            <td>{{ task.title }}</td>
            <td><a href="{{ task.file_url }}" target="_blank">Ашу</a></td>
            <td>
                <form action="/grade_task/{{ task.id }}" method="POST">
                    <input type="text" name="grade" value="{{ task.grade if task.grade else '' }}" style="width: 50px;">
                    <button type="submit">Сақтау</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
