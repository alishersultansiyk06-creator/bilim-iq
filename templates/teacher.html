<!DOCTYPE html>
<html>
<head>
    <title>Мұғалім кабинеті</title>
    <style>
        body { font-family: Arial; margin: 20px; background-color: #f0f0f0; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #eee; }
        input { width: 50px; padding: 5px; }
        button { padding: 5px 10px; background-color: #007bff; color: white; border: none; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Bilim IQ: Мұғалім панелі</h2>
            <div>
                <span>Мұғалім: <b>{{ session.username }}</b></span> | 
                <a href="/logout" style="color: red; text-decoration: none;">Шығу</a>
            </div>
        </div>

        <h3>Студенттердің тапсырмалары</h3>
        <table>
            <tr>
                <th>Студент</th>
                <th>Тақырып</th>
                <th>Файл</th>
                <th>Баға қою</th>
            </tr>
            {% for task, user in tasks %}
            <tr>
                <td>{{ user.username }}</td>
                <td>{{ task.title }}</td>
                <td><a href="{{ task.file_url }}" target="_blank">Ашу</a></td>
                <td>
                    <form action="/grade_task/{{ task.id }}" method="POST" style="display: flex; gap: 5px;">
                        <input type="text" name="grade" placeholder="---" value="{{ task.grade if task.grade else '' }}">
                        <button type="submit">Сақтау</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </table>
    </div>
</body>
</html>
